        <section class="equation-box">
            <h3>معادلة الطاقة (سر التنفس)</h3>

        <section class="lesson-content">
            <h2>ميكانيكا التنفس</h2>

            <div class="comparison">
                <div class="comp-box inhale">

                    <h4>الزفير</h4>

            </div>
